name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for npm provenance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          always-auth: true

      - run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Build admin UI
        run: npm --prefix apps/admin-svelte run build

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.ref_name }}" == *"-alpha"* ]] || [[ "${{ github.ref_name }}" == *"-beta"* ]]; then
            echo "dist_tag=alpha" >> $GITHUB_OUTPUT
          else
            echo "dist_tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Publish gateway
        run: npm publish -w @winstonfassett/webdev-gateway --tag ${{ steps.tag.outputs.dist_tag }} --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish vite adapter
        run: npm publish -w @winstonfassett/webdev-vite --tag ${{ steps.tag.outputs.dist_tag }} --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nextjs adapter
        run: npm publish -w @winstonfassett/webdev-nextjs --tag ${{ steps.tag.outputs.dist_tag }} --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
